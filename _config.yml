# Build settings
markdown: kramdown
highlighter: rouge
paginate: 3
paginate_path: /news/page:num/
excerpt_separator: <!--more-->

# Site-wide variables
keywords: Software Engineering, Software Testing, Program Analysis, Agentic AI, Large Language Models, Deep Learning
copyright: Copyright (c) Nashid Noor

# Collections
collections:
  writings:
    output: true
    permalink: /writings/:name/

defaults:
  - scope:
      path: ""
      type: writings
    values:
      layout: post

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-paginate
#  - jemoji

# Exclude files from processing
exclude:
  - CLAUDE.md
  - TODO.md
  - README.md
  - COPYRIGHT.md
  - ADD-SERVICE-SKILL-GUIDE.md
  - WRITING-STYLE-GUIDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - preview.sh
