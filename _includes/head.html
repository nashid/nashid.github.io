<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>
      {% if page.title and page.title != "Research" %}
        {{ site.title | append: ' | ' | append: page.title }}
      {% else %}
        {{ site.title | append: ' | ' | append: site.institution }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <meta name="keywords" content="{{ site.keywords }}" />
    <meta name="copyright" content="{{ site.copyright }}" />

    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}" />
    <meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" />
    {% if page.summary %}<meta property="og:description" content="{{ page.summary }}" />{% endif %}
    {% if page.image %}
    <meta property="og:image" content="{{ page.image | prepend: site.baseurl | prepend: site.url }}" />
    <meta name="twitter:card" content="summary_large_image" />
    {% else %}
    <meta name="twitter:card" content="summary" />
    {% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">{% if page.layout == 'post' or page.group == 'writings' %}<link rel="stylesheet" href="{{ "/css/writings.css" | prepend: site.baseurl }}">{% endif %}
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="shortcut icon" href="/resources/images/ubc.ico">
</head>
